name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Linux + Windows build on the self-hosted runners ($0). macOS builds on a
  # GitHub-hosted runner (only billed leg). Artifact retention trimmed 5 -> 2;
  # these are consumed by the publish job in the same run.
  build-linux:
    runs-on: [self-hosted, linux, lci-linux]
    name: build / lci-linux-amd64
    steps:
      - uses: actions/checkout@v4

      # zip/unzip/curl/tar are required by bootstrap-vcpkg.sh; without zip it
      # fails 'Could not find zip'. Install whatever is missing.
      - name: Ensure build tools
        run: |
          need=""
          command -v ninja  >/dev/null || need="$need ninja-build"
          command -v gcc-13 >/dev/null || need="$need gcc-13"
          command -v g++-13 >/dev/null || need="$need g++-13"
          command -v zip    >/dev/null || need="$need zip"
          command -v unzip  >/dev/null || need="$need unzip"
          command -v curl   >/dev/null || need="$need curl"
          command -v tar    >/dev/null || need="$need tar"
          if [ -n "$need" ]; then
            sudo apt-get update
            sudo apt-get install -y $need
          fi

      # run-vcpkg@v11 fatally errors ('pathspec vcpkg did not match') when a
      # vcpkg checkout already exists in the workspace on a persistent
      # self-hosted runner (it is not a git submodule). Remove it so the action
      # clones the pinned commit fresh, matching the ephemeral-runner path.
      - name: Clean stale vcpkg
        run: rm -rf "${{ github.workspace }}/vcpkg"

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/release --parallel

      # Gate on the green unit suite (lci_tests). The full ctest suite has
      # pre-existing integration failures triaged separately (see MEMORY /
      # ci.yml, where full ctest is likewise disabled); the unit suite is the
      # project's enforced green bar.
      - name: Test (unit suite)
        run: ./build/release/tests/lci_tests

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ
          cpack -G DEB
          cpack -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-linux-amd64
          path: |
            build/release/lci-*.tar.gz
            build/release/lci-*.deb
            build/release/lci-*.rpm
            build/release/src/lci
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: rm -rf build/release

  # NOTE: Windows and macOS build legs were removed. The codebase is currently
  # POSIX-only (popen, localtime_r/gmtime_r, mkstemp, sys/wait.h,
  # __builtin_ctzll, ...) and does not compile under MSVC; macOS hits a libc++
  # std::from_chars(double) deletion. v0.6.0 ships Linux artifacts only; the
  # installers (install.sh/ps1, npm, uv) fail fast on unsupported platforms.
  # Re-add these jobs once the Windows/macOS ports land.

  release:
    needs: [build-linux]
    runs-on: [self-hosted, linux, lci-linux]
    name: publish
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # Compute SHA256SUMS (basenames only) over the packaged artifacts so the
      # installers can verify integrity. The raw unpackaged binary is not
      # uploaded — the tarball is the canonical download.
      - name: Generate SHA256SUMS
        run: |
          cd dist
          : > SHA256SUMS
          find . -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' f; do
                sha256sum "$f" | sed 's|  .*/|  |'
              done >> SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/SHA256SUMS

      - name: Reclaim space
        if: always()
        run: rm -rf dist
