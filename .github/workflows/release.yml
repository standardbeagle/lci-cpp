name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            artifact: lci-linux-amd64
          - os: macos-latest
            compiler: appleclang
            cc: cc
            cxx: c++
            artifact: lci-darwin-universal
            cmake_extra: "-DLCI_UNIVERSAL_BINARY=ON"
          - os: windows-latest
            compiler: msvc
            artifact: lci-windows-amd64

    runs-on: ${{ matrix.os }}
    name: build / ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Install Linux tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Install macOS tools
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            ${{ matrix.cmake_extra }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --preset release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure --parallel

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build/release
          cpack -G TGZ

      - name: Package (Linux DEB/RPM)
        if: runner.os == 'Linux'
        run: |
          cd build/release
          cpack -G DEB
          cpack -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/release/lci-*.tar.gz
            build/release/lci-*.deb
            build/release/lci-*.rpm
            build/release/src/lci
            build/release/src/lci.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    name: publish

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/lci
            dist/**/lci.exe
