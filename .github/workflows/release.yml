name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Linux + Windows build on the self-hosted runners ($0). macOS builds on a
  # GitHub-hosted runner (only billed leg). Artifact retention trimmed 5 -> 2;
  # these are consumed by the publish job in the same run.
  build-linux:
    runs-on: [self-hosted, linux, lci-linux]
    timeout-minutes: 60
    name: build / lci-linux-amd64
    steps:
      - uses: actions/checkout@v4

      # zip/unzip/curl/tar are required by bootstrap-vcpkg.sh; without zip it
      # fails 'Could not find zip'. Install whatever is missing.
      - name: Ensure build tools
        run: |
          need=""
          command -v ninja  >/dev/null || need="$need ninja-build"
          command -v gcc-13 >/dev/null || need="$need gcc-13"
          command -v g++-13 >/dev/null || need="$need g++-13"
          command -v zip      >/dev/null || need="$need zip"
          command -v unzip    >/dev/null || need="$need unzip"
          command -v curl     >/dev/null || need="$need curl"
          command -v tar      >/dev/null || need="$need tar"
          command -v rpmbuild >/dev/null || need="$need rpm"
          if [ -n "$need" ]; then
            sudo apt-get update
            sudo apt-get install -y $need
          fi

      # run-vcpkg@v11 fatally errors ('pathspec vcpkg did not match') when a
      # vcpkg checkout already exists in the workspace on a persistent
      # self-hosted runner (it is not a git submodule). Remove it so the action
      # clones the pinned commit fresh, matching the ephemeral-runner path.
      - name: Clean stale vcpkg
        run: rm -rf "${{ github.workspace }}/vcpkg"

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/release --parallel

      # Gate on the green unit suite (lci_tests). The full ctest suite has
      # pre-existing integration failures triaged separately (see MEMORY /
      # ci.yml, where full ctest is likewise disabled); the unit suite is the
      # project's enforced green bar.
      - name: Test (unit suite)
        run: ./build/release/tests/lci_tests

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ
          cpack -G DEB
          cpack -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-linux-amd64
          path: |
            build/release/lci-*.tar.gz
            build/release/lci-*.deb
            build/release/lci-*.rpm
            build/release/src/lci
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: rm -rf build/release

  # Windows — self-hosted (lci-windows). $0 billed. Ships a single TGZ
  # (lci-<ver>-win64.tar.gz) — install.ps1 and updater::select_asset both match
  # *win64*.tar.gz, and Windows 10+ ships tar.exe, so no ZIP generator is
  # needed. Unit suite (lci_tests) gates the package, mirroring build-linux.
  build-windows:
    runs-on: [self-hosted, windows, lci-windows]
    timeout-minutes: 75
    name: build / lci-windows-amd64
    steps:
      - uses: actions/checkout@v4

      # run-vcpkg@v11 fatally errors when a vcpkg checkout already exists in the
      # workspace on a persistent self-hosted runner; remove it so the action
      # clones the pinned commit fresh.
      - name: Clean stale vcpkg
        run: if (Test-Path "${{ github.workspace }}/vcpkg") { Remove-Item -Recurse -Force "${{ github.workspace }}/vcpkg" }

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      # x64-windows-static-md links the vcpkg deps (abseil, re2, xxhash, ...)
      # statically INTO lci.exe while keeping the dynamic CRT (/MD) that the
      # project and its FetchContent deps already use. Without this the default
      # x64-windows triplet builds those deps as DLLs that the CPack TGZ does
      # not bundle, so the shipped binary fails to load on any machine without
      # them (the libprofiler.so.0 failure's Windows analogue). Keep this in
      # lockstep with the ci.yml windows leg so the unit gate exercises the same
      # linkage that ships.
      - name: Configure
        run: |
          cmake --preset release `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build/release --parallel --config Release

      # Full unit suite. The seven Unix-socket / POSIX-path suites once excluded
      # here (followups #4) are re-enabled: the socket fixtures take a
      # platform-correct address (tests/helpers/test_socket.h) and report_to_json
      # path normalization is now separator-independent (git/serialize.cpp).
      - name: Test (unit suite)
        run: |
          & build/release/tests/Release/lci_tests.exe
          if ($LASTEXITCODE -ne 0) { throw "lci_tests failed ($LASTEXITCODE)" }

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ -C Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-windows-amd64
          path: build/release/lci-*.tar.gz
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: if (Test-Path build/release) { Remove-Item -Recurse -Force build/release }

  # macOS — GitHub-hosted (the only billed leg). Native arm64 (macos-latest is
  # Apple Silicon); ships lci-<ver>-Darwin.tar.gz, which install.sh's Darwin
  # branch and updater::select_asset both match. x86_64 macs are not served by
  # this artifact (universal binary is a tracked follow-up).
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 70
    name: build / lci-darwin-arm64
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Install tools
        run: brew install ninja

      - name: Configure
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/release --parallel

      # FSEvents teardown abort fixed by patch-efsw.cmake (drains+releases the
      # dispatch queue on teardown). Only DetectsFileDelete stays excluded on
      # macOS — efsw doesn't classify an FSEvents unlink as Action::Delete
      # (tracked follow-up; see ci.yml macOS leg).
      - name: Test (unit suite)
        run: ./build/release/tests/lci_tests "--gtest_filter=-FileWatcherTest.DetectsFileDelete"

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-darwin-arm64
          path: build/release/lci-*.tar.gz
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: rm -rf build/release

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: [self-hosted, linux, lci-linux]
    timeout-minutes: 30
    name: publish
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # Compute SHA256SUMS (basenames only) over the packaged artifacts so the
      # installers can verify integrity. The raw unpackaged binary is not
      # uploaded — the tarball is the canonical download.
      - name: Generate SHA256SUMS
        run: |
          cd dist
          : > SHA256SUMS
          find . -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' f; do
                sha256sum "$f" | sed 's|  .*/|  |'
              done >> SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/SHA256SUMS

      - name: Reclaim space
        if: always()
        run: rm -rf dist
