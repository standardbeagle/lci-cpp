name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Linux + Windows build on the self-hosted runners ($0). macOS builds on a
  # GitHub-hosted runner (only billed leg). Artifact retention trimmed 5 -> 2;
  # these are consumed by the publish job in the same run.
  build-linux:
    runs-on: [self-hosted, linux, lci-linux]
    name: build / lci-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Ensure build tools
        run: |
          for t in ninja gcc-13 g++-13; do
            command -v "$t" >/dev/null || { sudo apt-get update; sudo apt-get install -y ninja-build gcc-13 g++-13; break; }
          done

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure --parallel

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ
          cpack -G DEB
          cpack -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-linux-amd64
          path: |
            build/release/lci-*.tar.gz
            build/release/lci-*.deb
            build/release/lci-*.rpm
            build/release/src/lci
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: rm -rf build/release

  build-windows:
    runs-on: [self-hosted, windows, lci-windows]
    name: build / lci-windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Configure
        run: |
          cmake --preset release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure --parallel

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-windows-amd64
          path: |
            build/release/lci-*.tar.gz
            build/release/src/lci.exe
          retention-days: 2

      - name: Reclaim build space
        if: always()
        run: if (Test-Path build/release) { Remove-Item -Recurse -Force build/release }

  build-macos:
    runs-on: macos-latest
    name: build / lci-darwin-universal
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "f3e10653cc27d62a37a3763cd84b38bca07c6075"

      - name: Install tools
        run: brew install ninja

      - name: Configure
        run: |
          cmake --preset release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DLCI_UNIVERSAL_BINARY=ON

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure --parallel

      - name: Package
        run: |
          cd build/release
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lci-darwin-universal
          path: |
            build/release/lci-*.tar.gz
            build/release/src/lci
          retention-days: 2

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: [self-hosted, linux, lci-linux]
    name: publish
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # The raw `lci` / `lci.exe` binaries from each platform share a name and
      # collide as release assets; the per-platform tarballs are the canonical
      # download. Compute SHA256SUMS (basenames only) over the packaged
      # artifacts so the installers can verify integrity.
      - name: Generate SHA256SUMS
        run: |
          cd dist
          : > SHA256SUMS
          find . -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' f; do
                sha256sum "$f" | sed 's|  .*/|  |'
              done >> SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.rpm
            dist/SHA256SUMS

      - name: Reclaim space
        if: always()
        run: rm -rf dist
